name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Selenium Tests (Chrome, Headless)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache Selenium Manager downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/selenium
          key: ${{ runner.os }}-selenium-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-selenium-

      - name: Build
        run: mvn clean compile test-compile -B

      - name: Run tests
        run: mvn test -B -Dbrowser=chrome -Dheadless=true -DsuiteXmlFile=src/test/resources/testng-ci.xml
        env:
          # Tell Selenium Manager exactly which Chrome binary to use so it downloads
          # the matching ChromeDriver rather than probing for Chrome itself.
          SE_CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: target/screenshots/
          retention-days: 7
